<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Set a new password — AI Agent Workforce Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="assets/stradigi-icon.png" />
</head>
<body>
<div class="chain-rail" aria-hidden="true"></div>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark"><img src="assets/stradigi-icon.png" alt="Stradigi" /></span>
      <div class="brand-text"><h1>AI Agent Workforce Portal</h1></div>
    </div>
    <h2>Set a new password</h2>
    <div id="message-box"></div>
    <form id="reset-form">
      <label>New password <span class="mono" style="color:var(--text-dimmer);">(min 8 characters)</span>
        <input type="password" id="password" required minlength="8" />
      </label>
      <button type="submit" class="btn btn-primary btn-block">Set password</button>
    </form>
    <div class="auth-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('message-box').innerHTML = '<div class="auth-error">Missing or invalid reset link.</div>';
  document.getElementById('reset-form').classList.add('hidden');
}

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const box = document.getElementById('message-box');
  const password = document.getElementById('password').value;
  try {
    await fetchJSON(`${API}/auth/reset-password`, {
      method: 'POST',
      body: JSON.stringify({ token, password }),
    });
    box.innerHTML = '<div class="auth-success">Password updated — you can now sign in.</div>';
    document.getElementById('reset-form').classList.add('hidden');
  } catch (err) {
    box.innerHTML = `<div class="auth-error">${escapeHTML(err.message)}</div>`;
  }
});
</script>
</body>
</html>
