<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — AI Agent Workforce Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="assets/stradigi-icon.png" />
</head>
<body>
<div class="chain-rail" aria-hidden="true"></div>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark"><img src="assets/stradigi-icon.png" alt="Stradigi" /></span>
      <div class="brand-text"><h1>AI Agent Workforce Portal</h1></div>
    </div>
    <h2>Forgot your password?</h2>
    <p class="auth-sub">We'll email you a reset link</p>
    <div id="message-box"></div>
    <form id="forgot-form">
      <label>Company slug
        <input type="text" id="tenant-slug" placeholder="e.g. acme-co" required />
      </label>
      <label>Email
        <input type="email" id="email" required />
      </label>
      <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
    </form>
    <div class="auth-footer"><a href="/login.html">Back to sign in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const box = document.getElementById('message-box');
  const tenantSlug = document.getElementById('tenant-slug').value.trim().toLowerCase();
  const email = document.getElementById('email').value.trim();
  try {
    const result = await fetchJSON(`${API}/auth/forgot-password`, {
      method: 'POST',
      body: JSON.stringify({ tenantSlug, email }),
    });
    box.innerHTML = `<div class="auth-success">${escapeHTML(result.message)}</div>`;
  } catch (err) {
    box.innerHTML = `<div class="auth-error">${escapeHTML(err.message)}</div>`;
  }
});
</script>
</body>
</html>
