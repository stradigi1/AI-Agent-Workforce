<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stradigi Staff Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" type="image/png" href="assets/stradigi-icon.png" />
</head>
<body>
<div class="chain-rail" aria-hidden="true"></div>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark" style="border-color:var(--purple);"><img src="assets/stradigi-icon.png" alt="Stradigi" /></span>
      <div class="brand-text"><h1>Stradigi Staff</h1><p class="brand-sub">Internal admin — separate from tenant accounts</p></div>
    </div>
    <h2>Sign in</h2>
    <div id="error-box"></div>
    <form id="login-form">
      <label>Email
        <input type="email" id="email" required autocomplete="username" />
      </label>
      <label>Password
        <input type="password" id="password" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <div class="auth-footer"><a href="/login.html">Tenant login</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error-box');
  errorBox.innerHTML = '';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const result = await fetchJSON(`${API}/auth/stradigi/login`, {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    setToken(result.token);
    setSession({ user: result.user, tenant: null });
    location.href = '/admin.html';
  } catch (err) {
    errorBox.innerHTML = `<div class="auth-error">${escapeHTML(err.message)}</div>`;
  }
});
</script>
</body>
</html>
